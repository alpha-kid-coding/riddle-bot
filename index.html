<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle Bot: Silly Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button id="reviews-btn" type="button" class="reviews-corner">Hot Takes</button>
  <button id="times-btn" type="button" class="times-corner">Speed Runs</button>
  <div id="score-corner" class="score-corner">Giggle Points: 0</div>
  <div id="timer-corner" class="timer-corner" hidden>Drama Clock: 00:00</div>

  <main class="app">
    <header class="header">
      <h1>Riddle Bot: Silly Mode</h1>
      <p class="subtitle">First try = big brain points · extra clues = fewer points · still funny either way</p>
    </header>

    <section class="card" aria-live="polite">
      <div class="progress">
        <span id="riddle-count">Brain Teaser 0 of 16</span>
        <span id="step-label">Ready</span>
      </div>

      <div id="content" class="content">
        <p class="prompt">Warming up the joke engine...</p>
      </div>

      <div class="hint-bar">
        <div class="step-dot" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
        <div class="step-dot" data-step="3"></div>
      </div>

      <div class="nav-bar">
        <button id="give-up-btn" type="button" class="give-up-btn" disabled>I Surrender</button>
        <button id="clue-btn" type="button" class="clue-btn" disabled>Spill a Clue</button>
        <button id="prev-btn" type="button" disabled>← Previous</button>
        <button id="end-game-btn" type="button" class="end-game-btn" disabled hidden>Mic Drop</button>
        <button id="next-btn" type="button" disabled>Next →</button>
      </div>
    </section>

    <footer class="footer">
      <p id="footer-text">Space -> riddle -> clues -> answer -> next chaos</p>
      <p class="team-credit">cootra</p>
    </footer>
  </main>

  <button id="keyboard-toggle-btn" type="button" class="keyboard-toggle">Type-o-matic</button>
  <button id="start-over-btn" type="button" class="start-over-btn">Do Over</button>
  <div id="virtual-keyboard" class="virtual-keyboard" hidden aria-label="Virtual keyboard"></div>

  <script src="riddles.js?v=63"></script>
  <script src="app.js?v=63"></script>
</body>
</html>
